# =============================================================================
# GitLab CI - DAST with OWASP ZAP
# Book Reference: Chapter 3, Section 3.1.3.2
# =============================================================================
# Features demonstrated:
#   - Security dashboard integration
#   - Scheduled scans
#   - Artifact uploads
# =============================================================================
#
# SETUP REQUIRED:
#   1. Set STAGING_URL CI/CD variable in GitLab project settings
#   2. Set SLACK_WEBHOOK_URL CI/CD variable (optional)
#   3. Configure scheduled pipeline in GitLab: CI/CD > Schedules
#   4. For GitLab Ultimate: DAST report format populates Security Dashboard
#
# GITLAB DAST INTEGRATION:
#   GitLab Ultimate parses gl-dast-report.json to populate:
#   - Security Dashboard
#   - Merge Request security widget
#   - Vulnerability Management
# =============================================================================

variables:
  # Target URL for DAST scanning
  # Override in GitLab CI/CD Variables: Settings > CI/CD > Variables
  DAST_TARGET_URL: $STAGING_URL

  # ZAP Docker image version - pin for reproducibility
  ZAP_IMAGE: "owasp/zap2docker-stable:2.14.0"

  # Artifact retention
  ARTIFACT_EXPIRE: "30 days"
  FULL_SCAN_ARTIFACT_EXPIRE: "90 days"

  # Risk threshold that blocks the pipeline
  # Options: High, Medium, Low, Informational
  BLOCK_RISK_LEVEL: "High"

stages:
  - deploy
  - dast
  - notify

# =============================================================================
# Stage: deploy
# Deploy to staging before scanning
# =============================================================================

deploy-staging:
  stage: deploy
  image: alpine:latest
  script:
    - echo "Deploying to staging..."
    # Replace with your actual deployment:
    # - ./scripts/deploy-staging.sh
    # - kubectl apply -f k8s/staging/
    - |
      # Wait for deployment to be ready
      MAX_RETRIES=30
      for i in $(seq 1 $MAX_RETRIES); do
        HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
          --max-time 10 "$DAST_TARGET_URL" || echo "000")
        if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 400 ]; then
          echo "✅ Staging ready (HTTP $HTTP_STATUS)"
          exit 0
        fi
        echo "Attempt $i/$MAX_RETRIES: HTTP $HTTP_STATUS - waiting..."
        sleep 10
      done
      echo "❌ Staging not ready"
      exit 1
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_BRANCH == "staging"'
    - if: '$CI_PIPELINE_SOURCE == "schedule"'

# =============================================================================
# Stage: dast - Baseline Scan
# Passive scan - safe for frequent execution
# =============================================================================

dast-baseline:
  stage: dast
  image: $ZAP_IMAGE
  needs:
    - deploy-staging

  variables:
    # GitLab DAST report path - parsed by GitLab Security Dashboard
    DAST_REPORT: gl-dast-report.json

  before_script:
    - mkdir -p /zap/wrk
    # Copy ZAP rules if they exist in the repository
    - |
      if [ -f ".zap/rules.tsv" ]; then
        cp .zap/rules.tsv /zap/wrk/rules.tsv
        echo "Custom ZAP rules loaded"
      fi

  script:
    # -------------------------------------------------------------------------
    # Run ZAP baseline scan
    # -t : target URL
    # -r : HTML report output
    # -J : JSON report output (GitLab DAST format)
    # -l : minimum alert level to include (WARN = Medium+)
    # -a : include alpha passive scan rules
    # -j : use Ajax spider (for JavaScript-heavy apps)
    # -------------------------------------------------------------------------
    - |
      zap-baseline.py \
        -t "$DAST_TARGET_URL" \
        -r zap-baseline-report.html \
        -J "$DAST_REPORT" \
        -l WARN \
        -a \
        -j \
        $([ -f /zap/wrk/rules.tsv ] && echo "-c /zap/wrk/rules.tsv") \
        || ZAP_EXIT=$?

    # -------------------------------------------------------------------------
    # Parse results and evaluate thresholds
    # -------------------------------------------------------------------------
    - |
      echo "=== ZAP Baseline Scan Summary ==="

      HIGH=$(jq '[.site[].alerts[] | select(.riskcode == "3")] | length' \
        "$DAST_REPORT" 2>/dev/null || echo "0")
      MEDIUM=$(jq '[.site[].alerts[] | select(.riskcode == "2")] | length' \
        "$DAST_REPORT" 2>/dev/null || echo "0")
      LOW=$(jq '[.site[].alerts[] | select(.riskcode == "1")] | length' \
        "$DAST_REPORT" 2>/dev/null || echo "0")

      echo "High:   $HIGH"
      echo "Medium: $MEDIUM"
      echo "Low:    $LOW"

      # Export for notification job
      echo "HIGH_COUNT=$HIGH"     >> build.env
      echo "MEDIUM_COUNT=$MEDIUM" >> build.env
      echo "LOW_COUNT=$LOW"       >> build.env

      # Block pipeline on high-risk findings
      if [ "$HIGH" -gt 0 ]; then
        echo "❌ Pipeline blocked: $HIGH high-risk finding(s) detected"
        echo "Review the Security tab in this merge request for details"
        exit 1
      fi

      echo "✅ No high-risk findings. Baseline scan passed."

  artifacts:
    # GitLab parses this report format for the Security Dashboard
    # Requires GitLab Ultimate for full dashboard integration
    reports:
      dast: $DAST_REPORT
    paths:
      - $DAST_REPORT
      - zap-baseline-report.html
      - build.env
    when: always
    expire_in: $ARTIFACT_EXPIRE

  # Block merge requests if this job fails
  allow_failure: false

  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: always
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: always
    - if: '$CI_COMMIT_BRANCH == "staging"'
      when: always

# =============================================================================
# Stage: dast - Full Scan
# Active attack simulation - scheduled runs only
# NEVER run against production
# =============================================================================

dast-full-scan:
  stage: dast
  image: $ZAP_IMAGE
  needs:
    - deploy-staging

  # Only run on scheduled pipelines or manual trigger
  # This prevents accidental active scans on every commit
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: always
    - when: manual
      allow_failure: true

  before_script:
    # Safety check - prevent scanning production
    - |
      if echo "$DAST_TARGET_URL" | grep -qE "^https?://(www\.)?yourapp\.com" && \
         ! echo "$DAST_TARGET_URL" | grep -q "staging\|dev\|test"; then
        echo "❌ SAFETY CHECK FAILED: Cannot run full scan against production URL"
        echo "Target: $DAST_TARGET_URL"
        exit 1
      fi
      echo "✅ Safety check passed. Target: $DAST_TARGET_URL"

    - mkdir -p /zap/wrk
    - |
      if [ -f ".zap/rules.tsv" ]; then
        cp .zap/rules.tsv /zap/wrk/rules.tsv
      fi

  script:
    # -------------------------------------------------------------------------
    # Run ZAP full scan with active attack rules
    # -z : ZAP command line options
    #   scanner.attackStrength=HIGH : aggressive scanning
    #   scanner.alertThreshold=MEDIUM : report medium+ findings
    # -------------------------------------------------------------------------
    - |
      zap-full-scan.py \
        -t "$DAST_TARGET_URL" \
        -r zap-full-report.html \
        -J gl-dast-full-report.json \
        -l WARN \
        -a \
        -j \
        $([ -f /zap/wrk/rules.tsv ] && echo "-c /zap/wrk/rules.tsv") \
        -z "-config scanner.attackStrength=HIGH
            -config scanner.alertThreshold=MEDIUM" \
        || ZAP_EXIT=$?

    - |
      echo "=== ZAP Full Scan Summary ==="
      HIGH=$(jq '[.site[].alerts[] | select(.riskcode == "3")] | length' \
        gl-dast-full-report.json 2>/dev/null || echo "0")
      MEDIUM=$(jq '[.site[].alerts[] | select(.riskcode == "2")] | length' \
        gl-dast-full-report.json 2>/dev/null || echo "0")

      echo "High:   $HIGH"
      echo "Medium: $MEDIUM"

      echo "FULL_HIGH_COUNT=$HIGH"     >> full-scan.env
      echo "FULL_MEDIUM_COUNT=$MEDIUM" >> full-scan.env

  artifacts:
    reports:
      dast: gl-dast-full-report.json
    paths:
      - gl-dast-full-report.json
      - zap-full-report.html
      - full-scan.env
    when: always
    expire_in: $FULL_SCAN_ARTIFACT_EXPIRE

# =============================================================================
# Stage: notify
# Send notifications after scan completion
# =============================================================================

notify-dast-results:
  stage: notify
  image: alpine:latest
  needs:
    - job: dast-baseline
      artifacts: true
  before_script:
    - apk add --no-cache curl jq
  script:
    - source build.env 2>/dev/null || true

    - |
      STATUS="✅ Passed"
      COLOR="good"

      if [ "${HIGH_COUNT:-0}" -gt 0 ]; then
        STATUS="🚨 Failed - ${HIGH_COUNT} high-risk finding(s)"
        COLOR="danger"
      elif [ "${MEDIUM_COUNT:-0}" -gt 0 ]; then
        STATUS="⚠️ Warning - ${MEDIUM_COUNT} medium-risk finding(s)"
        COLOR="warning"
      fi

      echo "Scan status: $STATUS"

      # Post to Slack if webhook is configured
      if [ -n "$SLACK_WEBHOOK_URL" ]; then
        curl -s -X POST "$SLACK_WEBHOOK_URL" \
          -H 'Content-type: application/json' \
          --data "{
            \"attachments\": [{
              \"color\": \"$COLOR\",
              \"title\": \"DAST Scan: $STATUS\",
              \"fields\": [
                {\"title\": \"Project\",  \"value\": \"$CI_PROJECT_NAME\",  \"short\": true},
                {\"title\": \"Branch\",   \"value\": \"$CI_COMMIT_BRANCH\", \"short\": true},
                {\"title\": \"Target\",   \"value\": \"$DAST_TARGET_URL\",  \"short\": false},
                {\"title\": \"High\",     \"value\": \"${HIGH_COUNT:-0}\",   \"short\": true},
                {\"title\": \"Medium\",   \"value\": \"${MEDIUM_COUNT:-0}\", \"short\": true},
                {\"title\": \"Pipeline\", \"value\": \"$CI_PIPELINE_URL\",  \"short\": false}
              ]
            }]
          }"
      fi

  rules:
    - when: always
  allow_failure: true

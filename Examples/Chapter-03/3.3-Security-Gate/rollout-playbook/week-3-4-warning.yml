# =============================================================================
# Week 3-4: Warning Mode Configuration
# Book Reference: Chapter 3, Section 3.2.1.3
# =============================================================================
#
# PURPOSE:
#   Deploy this configuration during weeks 3-4 of your security gate rollout.
#   Breaks ONLY on critical findings. Warns on everything else.
#   Goal: Train the team on fixing issues without blocking all merges.
#
# CHANGES FROM LEARNING MODE:
#   - Critical findings now BREAK the build
#   - High/medium findings post warnings but don't break
#   - PR comments now show ❌ for critical issues
#   - Team is expected to fix critical issues before merging
#
# SUCCESS CRITERIA FOR MOVING TO ENFORCEMENT MODE:
#   - Zero critical findings in last 5 builds
#   - Team knows how to fix common finding types
#   - Common patterns documented in team wiki
#   - False positive suppression rules in place (# nosemgrep)
#   - High finding count trending downward
# =============================================================================

name: Security Gate - Week 3-4 (Warning Mode)

on:
  push:
    branches: [ main, develop, staging ]
  pull_request:
    branches: [ main, develop ]

jobs:

  warning-mode-gate:
    name: "⚠️ Warning Mode - Break on Critical Only"
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write
      contents:      read

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Announce warning mode
        run: |
          echo "============================================"
          echo "  WARNING MODE - Week 3-4"
          echo "  Builds break on CRITICAL findings only."
          echo "  High/Medium findings are warnings."
          echo "  Goal: Train team on fixing issues."
          echo "============================================"

      - name: Run Semgrep SAST
        run: |
          docker run --rm \
            -v "$PWD:/src" \
            returntocorp/semgrep \
            semgrep scan \
              --config=auto \
              --config=p/security-audit \
              --config=p/owasp-top-ten \
              --json \
              --output=/src/sast-results.json \
              /src || true

      - name: Run Trivy dependency scan
        run: |
          docker run --rm \
            -v "$PWD:/src" \
            aquasec/trivy:latest \
            fs \
              --format json \
              --output /src/trivy-results.json \
              --exit-code 0 \
              /src || true

      - name: Count findings
        id: counts
        run: |
          SAST_CRIT=$(jq '[.results[] |
            select(.extra.severity == "ERROR")]   | length' \
            sast-results.json 2>/dev/null || echo "0")
          SAST_HIGH=$(jq '[.results[] |
            select(.extra.severity == "WARNING")] | length' \
            sast-results.json 2>/dev/null || echo "0")
          SAST_MED=$(jq  '[.results[] |
            select(.extra.severity == "INFO")]    | length' \
            sast-results.json 2>/dev/null || echo "0")
          DEP_CRIT=$(jq  '[.Results[].Vulnerabilities[]? |
            select(.Severity == "CRITICAL")] | length' \
            trivy-results.json 2>/dev/null || echo "0")
          DEP_HIGH=$(jq  '[.Results[].Vulnerabilities[]? |
            select(.Severity == "HIGH")]     | length' \
            trivy-results.json 2>/dev/null || echo "0")

          echo "sast_critical=$SAST_CRIT" >> $GITHUB_OUTPUT
          echo "sast_high=$SAST_HIGH"     >> $GITHUB_OUTPUT
          echo "sast_medium=$SAST_MED"    >> $GITHUB_OUTPUT
          echo "dep_critical=$DEP_CRIT"   >> $GITHUB_OUTPUT
          echo "dep_high=$DEP_HIGH"       >> $GITHUB_OUTPUT

          echo "Findings: SAST Critical=$SAST_CRIT High=$SAST_HIGH | Dep Critical=$DEP_CRIT High=$DEP_HIGH"

      # -----------------------------------------------------------------------
      # Print critical findings with full context
      # Principle: Provide Context - developers need to know what to fix
      # -----------------------------------------------------------------------
      - name: Print critical findings for developer context
        if: |
          steps.counts.outputs.sast_critical != '0' ||
          steps.counts.outputs.dep_critical != '0'
        run: |
          SAST_CRIT="${{ steps.counts.outputs.sast_critical }}"
          DEP_CRIT="${{  steps.counts.outputs.dep_critical }}"

          if [ "$SAST_CRIT" -gt 0 ]; then
            echo "=== SAST Critical Findings - Fix These Before Merging ==="
            jq -r '.results[] |
              select(.extra.severity == "ERROR") |
              "\n🔴 Rule    : \(.check_id)\n   File    : \(.path):\(.start.line)\n   Message : \(.extra.message)\n   Fix     : \(.extra.metadata.fix // "See rule documentation")"' \
              sast-results.json
          fi

          if [ "$DEP_CRIT" -gt 0 ]; then
            echo ""
            echo "=== Dependency Critical Vulnerabilities - Fix These Before Merging ==="
            jq -r '.Results[].Vulnerabilities[]? |
              select(.Severity == "CRITICAL") |
              "\n🔴 Package : \(.PkgName) \(.InstalledVersion)\n   CVE     : \(.VulnerabilityID)\n   Fix     : \(.FixedVersion // "No fix available - consider alternative package")\n   Details : \(.Description // "See CVE link")"' \
              trivy-results.json | head -60
          fi

      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const sastCrit = parseInt('${{ steps.counts.outputs.sast_critical }}');
            const sastHigh = parseInt('${{ steps.counts.outputs.sast_high }}');
            const sastMed  = parseInt('${{ steps.counts.outputs.sast_medium }}');
            const depCrit  = parseInt('${{ steps.counts.outputs.dep_critical }}');
            const depHigh  = parseInt('${{ steps.counts.outputs.dep_high }}');

            const hasCritical = sastCrit > 0 || depCrit > 0;
            const hasWarnings = sastHigh > 0 || depHigh > 0 || sastMed > 0;

            const statusIcon = hasCritical ? '❌' : (hasWarnings ? '⚠️' : '✅');
            const statusText = hasCritical
              ? 'BLOCKED - Critical Issues Found'
              : (hasWarnings ? 'PASSED WITH WARNINGS' : 'PASSED');

            let body = `## ${statusIcon} Security Gate: ${statusText} (Warning Mode - Week 3-4)\n\n`;
            body += `> ⚠️ **Warning Mode**: Builds break on critical findings only.\n`;
            body += `> High/medium findings are warnings to address this sprint.\n\n`;

            body += `| Scanner | 🔴 Critical | 🟠 High | 🟡 Medium |\n`;
            body += `|---------|------------|---------|----------|\n`;
            body += `| SAST (Semgrep) | ${sastCrit} | ${sastHigh} | ${sastMed} |\n`;
            body += `| Dependencies (Trivy) | ${depCrit} | ${depHigh} | — |\n\n`;

            if (hasCritical) {
              body += `### ❌ Action Required Before Merge\n\n`;
              body += `Fix all critical findings listed in the workflow logs.\n\n`;
              body += `**Common fixes:**\n`;
              body += `- Hardcoded secrets → Move to environment variables\n`;
              body += `- SQL injection → Use parameterized queries\n`;
              body += `- Critical CVEs → Update the vulnerable package\n\n`;
              body += `**If this is a false positive:**\n`;
              body += `- Add \`# nosemgrep: rule-id\` comment on the flagged line\n`;
              body += `- Document why it's a false positive in the PR description\n\n`;
            }

            if (hasWarnings && !hasCritical) {
              body += `### ⚠️ Warnings (Address This Sprint)\n\n`;
              body += `These findings don't block this merge but should be `;
              body += `addressed in the next sprint.\n\n`;
            }

            body += `📦 [View full scan results](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\n`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes('Warning Mode')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: warning-mode-${{ github.run_number }}
          path: |
            sast-results.json
            trivy-results.json
          retention-days: 30

      # -----------------------------------------------------------------------
      # Warning mode gate: break on critical ONLY
      # -----------------------------------------------------------------------
      - name: Enforce warning mode gate
        run: |
          SAST_CRIT="${{ steps.counts.outputs.sast_critical }}"
          DEP_CRIT="${{  steps.counts.outputs.dep_critical }}"
          SAST_HIGH="${{ steps.counts.outputs.sast_high }}"
          DEP_HIGH="${{  steps.counts.outputs.dep_high }}"

          # Warn about high findings (but don't break)
          if [ "$SAST_HIGH" -gt 0 ] || [ "$DEP_HIGH" -gt 0 ]; then
            echo "::warning::High severity findings detected."
            echo "  SAST High: $SAST_HIGH | Dep High: $DEP_HIGH"
            echo "  Please address these in the next sprint."
          fi

          # Break ONLY on critical
          if [ "$SAST_CRIT" -gt 0 ] || [ "$DEP_CRIT" -gt 0 ]; then
            echo "::error::Critical security findings detected."
            echo "  SAST Critical: $SAST_CRIT | Dep Critical: $DEP_CRIT"
            echo "  Fix these before merging."
            exit 1
          fi

          echo "✅ Warning mode gate passed."
          echo "   Transition to Enforcement Mode when:"
          echo "   □ Zero critical findings in last 5 builds"
          echo "   □ Team knows how to fix common finding types"
          echo "   □ Common patterns documented in team wiki"
          echo "   □ High finding count trending downward"

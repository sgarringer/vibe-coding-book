# csp.conf
# CSP-specific Apache configuration.
# Include alongside security-headers.conf.
#
# Note: Apache cannot generate per-request nonces natively.
# For nonce support, use the application-level examples (Node.js, Flask).
# This configuration is suitable for static sites or as a baseline
# before application-level CSP takes over.

# Required modules:
#   a2enmod headers
#   a2enmod proxy (for violation reporting proxy)

# ─── Enforcing CSP ────────────────────────────────────────────────────────────
# Baseline policy — tune for your application.
# Comment this out and use the Report-Only header below during initial rollout.
Header always set Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data: https:; connect-src 'self'; font-src 'self'; object-src 'none'; frame-src 'none'; base-uri 'self'; form-action 'self'; report-uri /csp-violations;"

# ─── Report-Only CSP (Week 1–2 of rollout — Section 2.6.3.1) ─────────────────
# Uncomment during initial rollout. Comment out the enforcing header above.
# Header always set Content-Security-Policy-Report-Only "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data: https:; connect-src 'self'; font-src 'self'; object-src 'none'; frame-src 'none'; base-uri 'self'; form-action 'self'; report-uri /csp-violations;"

# ─── CSP Violation Reporting ──────────────────────────────────────────────────
# Proxy violation reports to your application's reporting endpoint.
# Remove this block if your application handles /csp-violations directly.
<Location "/csp-violations">
    # Only accept POST requests from browsers
    <LimitExcept POST>
        Require all denied
    </LimitExcept>

    # Proxy to your application server
    ProxyPass "http://localhost:3000/csp-violations"
    ProxyPassReverse "http://localhost:3000/csp-violations"
</Location>

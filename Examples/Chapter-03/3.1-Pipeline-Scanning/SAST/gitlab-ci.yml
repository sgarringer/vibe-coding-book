# =============================================================================
# GitLab CI - Security-Integrated CI/CD Pipeline
# Book Reference: Chapter 3, Section 3.1.2.2
# =============================================================================
# Features demonstrated:
#   - SAST with Semgrep
#   - Security dashboard integration (GitLab Ultimate)
#   - Merge request blocking on critical findings
#   - SAST report artifacts
# =============================================================================

# Global variables available to all jobs
variables:
  # Semgrep configuration
  SEMGREP_RULES: >-
    p/security-audit
    p/owasp-top-ten
    p/secrets
  # Severity threshold that blocks the pipeline
  BLOCK_SEVERITY: "ERROR"
  # Artifact retention
  ARTIFACT_EXPIRE: "30 days"

# Pipeline stages - maps to Table 3.1 in the book
stages:
  - pre-check
  - build
  - test
  - security
  - deploy-staging
  - deploy-production

# =============================================================================
# Stage: pre-check
# Principle: Shift Left - fastest possible feedback
# =============================================================================

secret-detection:
  stage: pre-check
  image: returntocorp/semgrep:latest
  script:
    - semgrep scan
        --config=p/secrets
        --json
        --output=secret-scan-results.json
    - |
      SECRET_COUNT=$(jq '.results | length' secret-scan-results.json)
      if [ "$SECRET_COUNT" -gt 0 ]; then
        echo "Potential secrets detected in code!"
        jq '.results[] | "File: \(.path) Line: \(.start.line) Rule: \(.check_id)"' \
          secret-scan-results.json
        exit 1
      fi
  artifacts:
    when: always
    expire_in: $ARTIFACT_EXPIRE
    paths:
      - secret-scan-results.json
  # Run on all branches and MRs
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

# =============================================================================
# Stage: security
# Full SAST scan with GitLab Security Dashboard integration
# =============================================================================

semgrep-sast:
  stage: security
  image: returntocorp/semgrep:latest

  variables:
    # GitLab SAST report format for Security Dashboard
    SAST_REPORT: gl-sast-report.json

  script:
    # -------------------------------------------------------------------------
    # Run Semgrep with GitLab-compatible output format
    # The gl-sast-report.json format populates the GitLab Security Dashboard
    # -------------------------------------------------------------------------
    - |
      semgrep scan \
        --config=auto \
        --config=p/security-audit \
        --config=p/owasp-top-ten \
        --gitlab-sast \
        --output=$SAST_REPORT \
        --json \
        --output=semgrep-raw-results.json

    # -------------------------------------------------------------------------
    # Count findings by severity
    # -------------------------------------------------------------------------
    - |
      echo "=== Semgrep Scan Summary ==="
      CRITICAL=$(jq '[.results[] | select(.extra.severity == "ERROR")] | length' \
        semgrep-raw-results.json)
      WARNING=$(jq '[.results[] | select(.extra.severity == "WARNING")] | length' \
        semgrep-raw-results.json)
      INFO=$(jq '[.results[] | select(.extra.severity == "INFO")] | length' \
        semgrep-raw-results.json)

      echo "Critical: $CRITICAL"
      echo "Warning:  $WARNING"
      echo "Info:     $INFO"

      # Export for use in downstream steps
      echo "CRITICAL_COUNT=$CRITICAL" >> build.env

    # -------------------------------------------------------------------------
    # Block the pipeline on critical findings
    # Principle: Fail Fast
    # -------------------------------------------------------------------------
    - |
      if [ "$CRITICAL_COUNT" -gt 0 ]; then
        echo "Pipeline blocked: $CRITICAL_COUNT critical security issue(s) found."
        echo "Review the Security tab in this merge request for details."
        exit 1
      fi
      echo "✅ No critical security issues found."

  artifacts:
    # GitLab parses gl-sast-report.json to populate the Security Dashboard
    # This is the key integration point for GitLab Ultimate users
    reports:
      sast: $SAST_REPORT
    # Also upload raw results for manual review
    paths:
      - $SAST_REPORT
      - semgrep-raw-results.json
      - build.env
    when: always
    expire_in: $ARTIFACT_EXPIRE

  # ---------------------------------------------------------------------------
  # Merge Request integration
  # Block MR from merging if this job fails
  # Configure in GitLab: Settings > Merge Requests > Status checks
  # ---------------------------------------------------------------------------
  allow_failure: false

  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: always
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: always
    - if: '$CI_COMMIT_BRANCH == "develop"'
      when: always

# =============================================================================
# Stage: deploy-staging
# DAST scan after deployment to staging
# See Chapter 3, Table 3.1
# =============================================================================

dast-staging:
  stage: deploy-staging
  image: owasp/zap2docker-stable:latest

  variables:
    STAGING_URL: $STAGING_APP_URL   # Set in GitLab CI/CD Variables

  script:
    - |
      # Run ZAP baseline scan against staging environment
      zap-baseline.py \
        -t $STAGING_URL \
        -r zap-report.html \
        -J zap-report.json \
        -l WARN \
        -z "-config scanner.attackStrength=HIGH"

  artifacts:
    reports:
      dast: zap-report.json
    paths:
      - zap-report.html
      - zap-report.json
    when: always
    expire_in: $ARTIFACT_EXPIRE

  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_BRANCH == "develop"'
  # Only run if staging URL is configured
  when: manual
  allow_failure: true

# =============================================================================
# Notification job - runs after security stage regardless of outcome
# =============================================================================

notify-security-results:
  stage: security
  image: alpine:latest
  needs:
    - job: semgrep-sast
      artifacts: true
  before_script:
    - apk add --no-cache curl jq
  script:
    - |
      # Read counts from previous job's environment
      source build.env 2>/dev/null || CRITICAL_COUNT=0

      STATUS="✅ Passed"
      COLOR="good"
      if [ "$CRITICAL_COUNT" -gt 0 ]; then
        STATUS="🚨 Failed - $CRITICAL_COUNT critical issue(s)"
        COLOR="danger"
      fi

      # Post to Slack if webhook is configured
      if [ -n "$SLACK_WEBHOOK_URL" ]; then
        curl -s -X POST "$SLACK_WEBHOOK_URL" \
          -H 'Content-type: application/json' \
          --data "{
            \"attachments\": [{
              \"color\": \"$COLOR\",
              \"title\": \"Security Scan: $STATUS\",
              \"fields\": [
                {\"title\": \"Project\",  \"value\": \"$CI_PROJECT_NAME\",  \"short\": true},
                {\"title\": \"Branch\",   \"value\": \"$CI_COMMIT_BRANCH\", \"short\": true},
                {\"title\": \"Author\",   \"value\": \"$GITLAB_USER_NAME\", \"short\": true},
                {\"title\": \"Pipeline\", \"value\": \"$CI_PIPELINE_URL\",  \"short\": false}
              ]
            }]
          }"
      fi
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: always
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: always
  allow_failure: true

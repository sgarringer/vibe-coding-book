# ============================================
# APACHE HTTPS CONFIGURATION
# ============================================
# Referenced in: Vibe-Coded App Security Framework
# Chapter 2.5.1: HTTPS Everywhere
#
# Security Features:
# - HTTP to HTTPS redirect
# - TLS 1.2 and 1.3 only
# - Strong cipher suites
# - HSTS header
# - Security headers
# ============================================

# ============================================
# ENABLE REQUIRED MODULES
# ============================================
# Run these commands first:
# sudo a2enmod ssl
# sudo a2enmod rewrite
# sudo a2enmod headers
# sudo a2enmod http2

# ============================================
# HTTP VIRTUAL HOST (Redirect to HTTPS)
# ============================================
<VirtualHost *:80>
    ServerName yourapp.com
    ServerAlias www.yourapp.com

    # Redirect all HTTP traffic to HTTPS
    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteRule ^(.*)$ https://%{HTTP_HOST}$1 [R=301,L]

    ErrorLog ${APACHE_LOG_DIR}/yourapp-error.log
    CustomLog ${APACHE_LOG_DIR}/yourapp-access.log combined
</VirtualHost>

# ============================================
# HTTPS VIRTUAL HOST
# ============================================
<VirtualHost *:443>
    ServerName yourapp.com
    ServerAlias www.yourapp.com

    DocumentRoot /var/www/yourapp/public

    # ============================================
    # SSL CERTIFICATE
    # ============================================
    # Let's Encrypt certificates
    SSLCertificateFile /etc/letsencrypt/live/yourapp.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/yourapp.com/privkey.pem

    # ============================================
    # SSL/TLS CONFIGURATION
    # ============================================
    SSLEngine on

    # Use TLS 1.2 and 1.3 only
    SSLProtocol -all +TLSv1.2 +TLSv1.3

    # Strong cipher suites
    SSLCipherSuite ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384

    # Prefer server ciphers
    SSLHonorCipherOrder off

    # ============================================
    # SSL SESSION
    # ============================================
    SSLSessionCache shmcb:/var/cache/apache2/ssl_scache(512000)
    SSLSessionCacheTimeout 300

    # ============================================
    # OCSP STAPLING
    # ============================================
    SSLUseStapling on
    SSLStaplingCache shmcb:/var/cache/apache2/stapling_cache(128000)

    # ============================================
    # HTTP/2
    # ============================================
    Protocols h2 http/1.1

    # ============================================
    # SECURITY HEADERS
    # ============================================
    # HSTS (HTTP Strict Transport Security)
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"

    # Prevent clickjacking
    Header always set X-Frame-Options "SAMEORIGIN"

    # Prevent MIME type sniffing
    Header always set X-Content-Type-Options "nosniff"

    # XSS protection
    Header always set X-XSS-Protection "1; mode=block"

    # Referrer policy
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    # Content Security Policy
    Header always set Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline';"

    # Permissions Policy
    Header always set Permissions-Policy "geolocation=(), microphone=(), camera=()"

    # ============================================
    # PROXY TO APPLICATION
    # ============================================
    # Proxy to Node.js application on port 3000
    ProxyPreserveHost On
    ProxyPass / http://localhost:3000/
    ProxyPassReverse / http://localhost:3000/

    # Pass real IP and protocol
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"

    # ============================================
    # DIRECTORY PERMISSIONS
    # ============================================
    <Directory /var/www/yourapp/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # ============================================
    # STATIC FILE CACHING
    # ============================================
    <FilesMatch "\.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$">
        Header set Cache-Control "max-age=31536000, public, immutable"
    </FilesMatch>

    # ============================================
    # DENY ACCESS TO HIDDEN FILES
    # ============================================
    <FilesMatch "^\.">
        Require all denied
    </FilesMatch>

    # ============================================
    # LOGGING
    # ============================================
    ErrorLog ${APACHE_LOG_DIR}/yourapp-ssl-error.log
    CustomLog ${APACHE_LOG_DIR}/yourapp-ssl-access.log combined
</VirtualHost>

# ============================================
# GLOBAL SSL CONFIGURATION
# ============================================
# Add to /etc/apache2/mods-available/ssl.conf

# OCSP Stapling (global)
SSLStaplingResponderTimeout 5
SSLStaplingReturnResponderErrors off

# SSL Session Cache (global)
SSLSessionCache shmcb:/var/cache/apache2/ssl_scache(512000)
SSLSessionCacheTimeout 300

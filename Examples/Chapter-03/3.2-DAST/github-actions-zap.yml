# =============================================================================
# GitHub Actions - DAST with OWASP ZAP
# Book Reference: Chapter 3, Section 3.1.3.2
# =============================================================================
# Features demonstrated:
#   - Baseline and full scans
#   - Custom rules configuration
#   - High-risk issue detection
#   - HTML and JSON reports
# =============================================================================
#
# SETUP REQUIRED:
#   1. Set STAGING_URL secret in GitHub repository settings
#   2. Set SLACK_WEBHOOK_URL secret (optional, for notifications)
#   3. Ensure staging environment is accessible from GitHub Actions runners
#   4. Copy zap-rules.tsv to .zap/rules.tsv in your repository
#
# SCAN TYPES:
#   Baseline Scan : Passive scan only - no active attacks - safe for production
#   Full Scan     : Active attack simulation - staging/dev environments ONLY
#   API Scan      : OpenAPI/Swagger spec-driven scan for REST APIs
# =============================================================================

name: DAST Scan - OWASP ZAP

on:
  # Trigger on push to staging branch (Quick Start pattern from book)
  push:
    branches: [ staging ]

  # Also run on PRs targeting main for early feedback
  pull_request:
    branches: [ main ]

  # Scheduled full scan - runs nightly at 2am UTC
  # Principle: Continuous Improvement - regular scanning catches regressions
  schedule:
    - cron: '0 2 * * *'

  # Allow manual trigger with scan type selection
  workflow_dispatch:
    inputs:
      scan_type:
        description: 'Scan type to run'
        required: true
        default: 'baseline'
        type: choice
        options:
          - baseline
          - full
          - api
      target_url:
        description: 'Target URL (overrides STAGING_URL secret)'
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ---------------------------------------------------------------------------
  # Job 1: Deploy to Staging
  # Ensures a fresh deployment exists before scanning
  # ---------------------------------------------------------------------------
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    # Only deploy on push/schedule - not on PRs (assume staging already exists)
    if: |
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'

    outputs:
      # Pass the target URL to downstream jobs
      target_url: ${{ steps.set-url.outputs.target_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to staging environment
        run: |
          # Replace with your actual deployment command:
          # ./scripts/deploy-staging.sh
          # kubectl apply -f k8s/staging/
          # helm upgrade --install myapp ./charts/myapp -f values-staging.yaml
          echo "Deploying to staging..."
          echo "Replace this step with your actual deployment command"

      - name: Wait for deployment to be ready
        run: |
          TARGET_URL="${{ secrets.STAGING_URL }}"

          echo "Waiting for $TARGET_URL to be ready..."
          MAX_RETRIES=30
          RETRY_INTERVAL=10

          for i in $(seq 1 $MAX_RETRIES); do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 10 "$TARGET_URL" || echo "000")

            if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 400 ]; then
              echo "✅ Staging is ready (HTTP $HTTP_STATUS)"
              exit 0
            fi

            echo "Attempt $i/$MAX_RETRIES: HTTP $HTTP_STATUS - retrying in ${RETRY_INTERVAL}s..."
            sleep $RETRY_INTERVAL
          done

          echo "❌ Staging did not become ready in time"
          exit 1

      - name: Set target URL output
        id: set-url
        run: |
          # Use workflow_dispatch input if provided, otherwise use secret
          if [ -n "${{ github.event.inputs.target_url }}" ]; then
            echo "target_url=${{ github.event.inputs.target_url }}" >> $GITHUB_OUTPUT
          else
            echo "target_url=${{ secrets.STAGING_URL }}" >> $GITHUB_OUTPUT
          fi

  # ---------------------------------------------------------------------------
  # Job 2: ZAP Baseline Scan
  # Passive scan - safe to run frequently, no active attacks
  # Timing: ~5-10 minutes (see Table 3.1)
  # ---------------------------------------------------------------------------
  zap-baseline:
    name: ZAP Baseline Scan (Passive)
    runs-on: ubuntu-latest
    needs: deploy-staging
    # Run baseline on PRs and pushes - it's fast and non-destructive
    if: |
      always() &&
      (needs.deploy-staging.result == 'success' ||
       needs.deploy-staging.result == 'skipped') &&
      github.event.inputs.scan_type != 'full' &&
      github.event.inputs.scan_type != 'api'

    permissions:
      contents: read
      issues: write          # Required to create issues for findings
      pull-requests: write   # Required for PR comments

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Determine target URL
        id: target
        run: |
          if [ -n "${{ needs.deploy-staging.outputs.target_url }}" ]; then
            echo "url=${{ needs.deploy-staging.outputs.target_url }}" >> $GITHUB_OUTPUT
          else
            echo "url=${{ secrets.STAGING_URL }}" >> $GITHUB_OUTPUT
          fi

      # -----------------------------------------------------------------------
      # ZAP Baseline Scan
      # Crawls the application and runs passive checks only
      # Will not send attack payloads - safe for any environment
      # -----------------------------------------------------------------------
      - name: Run ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.10.0
        with:
          target: ${{ steps.target.outputs.url }}
          # Custom rules file - see zap-rules.tsv
          rules_file_name: '.zap/rules.tsv'
          # Fail on WARN or higher (configurable)
          fail_action: true
          # Generate reports
          cmd_options: >-
            -a
            -j
            -r zap-baseline-report.html
            -w zap-baseline-report.md
            -J zap-baseline-report.json
            -l WARN
        # Don't fail immediately - we want to upload reports first
        continue-on-error: true
        id: baseline-scan

      # -----------------------------------------------------------------------
      # Upload reports as artifacts
      # -----------------------------------------------------------------------
      - name: Upload ZAP reports
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: zap-baseline-reports-${{ github.run_number }}
          path: |
            zap-baseline-report.html
            zap-baseline-report.json
            zap-baseline-report.md
          retention-days: 30

      # -----------------------------------------------------------------------
      # Parse results and generate summary
      # -----------------------------------------------------------------------
      - name: Parse scan results
        if: always()
        id: parse-results
        run: |
          if [ ! -f zap-baseline-report.json ]; then
            echo "No JSON report found"
            exit 0
          fi

          # Count alerts by risk level
          HIGH=$(jq '[.site[].alerts[] | select(.riskcode == "3")] | length' \
            zap-baseline-report.json 2>/dev/null || echo "0")
          MEDIUM=$(jq '[.site[].alerts[] | select(.riskcode == "2")] | length' \
            zap-baseline-report.json 2>/dev/null || echo "0")
          LOW=$(jq '[.site[].alerts[] | select(.riskcode == "1")] | length' \
            zap-baseline-report.json 2>/dev/null || echo "0")
          INFO=$(jq '[.site[].alerts[] | select(.riskcode == "0")] | length' \
            zap-baseline-report.json 2>/dev/null || echo "0")

          echo "high=$HIGH"     >> $GITHUB_OUTPUT
          echo "medium=$MEDIUM" >> $GITHUB_OUTPUT
          echo "low=$LOW"       >> $GITHUB_OUTPUT
          echo "info=$INFO"     >> $GITHUB_OUTPUT

          # Write GitHub Actions summary
          echo "## 🔍 ZAP Baseline Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Target:** ${{ steps.target.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Risk Level | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|------------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔴 High    | $HIGH   |" >> $GITHUB_STEP_SUMMARY
          echo "| 🟠 Medium  | $MEDIUM |" >> $GITHUB_STEP_SUMMARY
          echo "| 🟡 Low     | $LOW    |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔵 Info    | $INFO   |" >> $GITHUB_STEP_SUMMARY

          # List high-risk findings
          if [ "$HIGH" -gt 0 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 🔴 High Risk Findings" >> $GITHUB_STEP_SUMMARY
            jq -r '.site[].alerts[] |
              select(.riskcode == "3") |
              "- **\(.alert)**: \(.desc | split(".")[0])"' \
              zap-baseline-report.json >> $GITHUB_STEP_SUMMARY
          fi

      # -----------------------------------------------------------------------
      # Post PR comment with results
      # -----------------------------------------------------------------------
      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            let report = {};
            try {
              report = JSON.parse(fs.readFileSync('zap-baseline-report.json', 'utf8'));
            } catch (e) {
              console.log('Could not read report:', e.message);
              return;
            }

            const alerts = report.site?.flatMap(s => s.alerts) || [];
            const high   = alerts.filter(a => a.riskcode === '3');
            const medium = alerts.filter(a => a.riskcode === '2');
            const low    = alerts.filter(a => a.riskcode === '1');

            let body = `## 🔍 ZAP DAST Baseline Scan Results\n\n`;
            body += `**Target:** ${{ steps.target.outputs.url }}\n\n`;
            body += `| Risk Level | Count |\n|------------|-------|\n`;
            body += `| 🔴 High   | ${high.length}   |\n`;
            body += `| 🟠 Medium | ${medium.length} |\n`;
            body += `| 🟡 Low    | ${low.length}    |\n\n`;

            if (high.length > 0) {
              body += `### 🔴 High Risk Issues (Requires Immediate Attention)\n\n`;
              high.forEach(a => {
                body += `**${a.alert}**\n`;
                body += `- Risk: ${a.riskdesc}\n`;
                body += `- Description: ${a.desc?.split('.')[0]}\n`;
                body += `- Solution: ${a.solution?.split('.')[0]}\n\n`;
              });
            }

            if (medium.length > 0) {
              body += `### 🟠 Medium Risk Issues\n\n`;
              medium.slice(0, 5).forEach(a => {
                body += `- **${a.alert}**: ${a.desc?.split('.')[0]}\n`;
              });
              if (medium.length > 5) {
                body += `_...and ${medium.length - 5} more. See artifacts._\n`;
              }
            }

            body += `\n---\n📦 Full HTML report available in `;
            body += `[workflow artifacts](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\n`;

            // Update or create PR comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes('ZAP DAST Baseline Scan Results')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      # -----------------------------------------------------------------------
      # Fail the build if high-risk issues were found
      # Principle: Fail Fast
      # -----------------------------------------------------------------------
      - name: Evaluate scan results
        run: |
          HIGH="${{ steps.parse-results.outputs.high }}"

          if [ "$HIGH" -gt 0 ]; then
            echo "❌ $HIGH high-risk issue(s) found. Build blocked."
            echo "Review the ZAP report artifact for remediation guidance."
            exit 1
          fi

          echo "✅ No high-risk issues found in baseline scan."

  # ---------------------------------------------------------------------------
  # Job 3: ZAP Full Scan
  # Active attack simulation - STAGING ONLY
  # Timing: ~10-30 minutes (see Table 3.1)
  # ---------------------------------------------------------------------------
  zap-full-scan:
    name: ZAP Full Scan (Active - Staging Only)
    runs-on: ubuntu-latest
    needs: deploy-staging
    # Only run full scan on schedule or explicit workflow_dispatch
    # NEVER run active scans against production
    if: |
      always() &&
      needs.deploy-staging.result == 'success' &&
      (github.event_name == 'schedule' ||
       github.event.inputs.scan_type == 'full')

    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # -----------------------------------------------------------------------
      # Safety check - ensure we're not scanning production
      # -----------------------------------------------------------------------
      - name: Verify target is not production
        run: |
          TARGET="${{ needs.deploy-staging.outputs.target_url }}"

          # List of production URL patterns to block
          PROD_PATTERNS=("yourapp.com" "app.yourcompany.com" "api.yourcompany.com")

          for PATTERN in "${PROD_PATTERNS[@]}"; do
            if echo "$TARGET" | grep -q "$PATTERN" && \
               ! echo "$TARGET" | grep -q "staging\|dev\|test"; then
              echo "❌ SAFETY CHECK FAILED"
              echo "Target '$TARGET' appears to be a production URL."
              echo "Full scans must only run against staging/dev environments."
              exit 1
            fi
          done

          echo "✅ Safety check passed. Target: $TARGET"

      # -----------------------------------------------------------------------
      # ZAP Full Scan - active attack simulation
      # This sends actual attack payloads to find vulnerabilities
      # -----------------------------------------------------------------------
      - name: Run ZAP Full Scan
        uses: zaproxy/action-full-scan@v0.9.0
        with:
          target: ${{ needs.deploy-staging.outputs.target_url }}
          rules_file_name: '.zap/rules.tsv'
          cmd_options: >-
            -a
            -j
            -r zap-full-report.html
            -J zap-full-report.json
            -l WARN
            -z "-config scanner.attackStrength=HIGH
                -config scanner.alertThreshold=MEDIUM"
        continue-on-error: true
        id: full-scan

      - name: Upload full scan reports
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: zap-full-scan-reports-${{ github.run_number }}
          path: |
            zap-full-report.html
            zap-full-report.json
          retention-days: 90    # Keep full scan results longer

      # -----------------------------------------------------------------------
      # Create GitHub Issue for full scan findings
      # Full scans run on schedule so there's no PR to comment on
      # -----------------------------------------------------------------------
      - name: Create issue for high-risk findings
        if: always()
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            let report = {};
            try {
              report = JSON.parse(fs.readFileSync('zap-full-report.json', 'utf8'));
            } catch (e) {
              console.log('No report to process');
              return;
            }

            const alerts = report.site?.flatMap(s => s.alerts) || [];
            const high   = alerts.filter(a => a.riskcode === '3');
            const medium = alerts.filter(a => a.riskcode === '2');

            // Only create issue if there are findings worth reporting
            if (high.length === 0 && medium.length === 0) {
              console.log('No high/medium findings - skipping issue creation');
              return;
            }

            let body = `## 🚨 ZAP Full Scan Security Findings\n\n`;
            body += `**Scan Date:** ${new Date().toISOString()}\n`;
            body += `**Target:** ${{ needs.deploy-staging.outputs.target_url }}\n`;
            body += `**Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\n\n`;
            body += `| Risk | Count |\n|------|-------|\n`;
            body += `| 🔴 High   | ${high.length}   |\n`;
            body += `| 🟠 Medium | ${medium.length} |\n\n`;

            if (high.length > 0) {
              body += `### 🔴 High Risk Findings\n\n`;
              high.forEach(a => {
                body += `#### ${a.alert}\n`;
                body += `- **Risk:** ${a.riskdesc}\n`;
                body += `- **CWE:** ${a.cweid}\n`;
                body += `- **Description:** ${a.desc}\n`;
                body += `- **Solution:** ${a.solution}\n`;
                body += `- **Reference:** ${a.reference}\n\n`;
              });
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 DAST Full Scan: ${high.length} high-risk findings - ${new Date().toLocaleDateString()}`,
              body,
              labels: ['security', 'dast', 'automated'],
            });

      # -----------------------------------------------------------------------
      # Slack notification for scheduled scans
      # -----------------------------------------------------------------------
      - name: Notify Slack of scan completion
        if: always() && secrets.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "ZAP Full Scan Complete",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*🔍 ZAP Full DAST Scan Complete*\n*Target:* ${{ needs.deploy-staging.outputs.target_url }}\n*Status:* ${{ steps.full-scan.outcome }}"
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": { "type": "plain_text", "text": "View Results" },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  # ---------------------------------------------------------------------------
  # Job 4: ZAP API Scan
  # OpenAPI/Swagger spec-driven scan for REST APIs
  # ---------------------------------------------------------------------------
  zap-api-scan:
    name: ZAP API Scan
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: |
      always() &&
      needs.deploy-staging.result == 'success' &&
      github.event.inputs.scan_type == 'api'

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run ZAP API Scan
        uses: zaproxy/action-api-scan@v0.5.0
        with:
          target: '${{ needs.deploy-staging.outputs.target_url }}/openapi.json'
          format: openapi
          rules_file_name: '.zap/rules.tsv'
          cmd_options: >-
            -r zap-api-report.html
            -J zap-api-report.json
        continue-on-error: true

      - name: Upload API scan reports
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: zap-api-scan-reports-${{ github.run_number }}
          path: |
            zap-api-report.html
            zap-api-report.json
          retention-days: 30

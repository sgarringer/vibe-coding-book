# Fluentd Configuration
# Chapter 2.10.5
#
# Alternative to Fluent Bit — use Fluentd if you need richer plugin support.
# Fluent Bit is recommended for most deployments (lower resource usage).
#
# Install: https://docs.fluentd.org/installation

<system>
  log_level warn
</system>

# ─── Input: Docker Log Driver ─────────────────────────────────────────────────

<source>
  @type forward
  port 24224
  bind 0.0.0.0
</source>

# ─── Input: Application Log Files ─────────────────────────────────────────────

<source>
  @type tail
  path /var/log/app/*.log
  pos_file /var/log/fluentd/app.log.pos
  tag app.file
  <parse>
    @type json
    time_key timestamp
    time_format %Y-%m-%dT%H:%M:%SZ
  </parse>
</source>

# ─── Filter: Add Metadata ─────────────────────────────────────────────────────

<filter app.**>
  @type record_transformer
  <record>
    environment "#{ENV['ENV'] || 'production'}"
    app_name    "#{ENV['APP_NAME'] || 'my-app'}"
  </record>
</filter>

# ─── Route Security Events to Separate Stream ─────────────────────────────────
# Security and audit events get tagged separately for routing to
# longer-retention destinations

<match app.**>
  @type rewrite_tag_filter
  <rule>
    key     event
    pattern /^(auth\.|authz\.|security\.event|apikey\.)/
    tag     security.${tag}
  </rule>
  <rule>
    key     event
    pattern /^authz\.privilege\.change$|^apikey\./
    tag     audit.${tag}
  </rule>
  <rule>
    key     event
    pattern /.*/
    tag     application.${tag}
  </rule>
</match>

# ─── Output: AWS CloudWatch ───────────────────────────────────────────────────

<match security.**>
  @type cloudwatch_logs
  log_group_name  "/app/#{ENV['APP_NAME']}/#{ENV['ENV']}/security"
  log_stream_name "fluentd/#{Socket.gethostname}"
  region          "#{ENV['AWS_REGION'] || 'us-east-1'}"
  auto_create_stream true
  <buffer>
    flush_interval 5s
    retry_max_times 10
  </buffer>
</match>

<match audit.**>
  @type cloudwatch_logs
  log_group_name  "/app/#{ENV['APP_NAME']}/#{ENV['ENV']}/audit"
  log_stream_name "fluentd/#{Socket.gethostname}"
  region          "#{ENV['AWS_REGION'] || 'us-east-1'}"
  auto_create_stream true
  <buffer>
    flush_interval 5s
    retry_max_times 10
  </buffer>
</match>

<match application.**>
  @type cloudwatch_logs
  log_group_name  "/app/#{ENV['APP_NAME']}/#{ENV['ENV']}/application"
  log_stream_name "fluentd/#{Socket.gethostname}"
  region          "#{ENV['AWS_REGION'] || 'us-east-1'}"
  auto_create_stream true
  <buffer>
    flush_interval 5s
    retry_max_times 10
  </buffer>
</match>

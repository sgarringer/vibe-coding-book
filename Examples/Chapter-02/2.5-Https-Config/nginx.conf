# ============================================
# NGINX HTTPS CONFIGURATION
# ============================================
# Referenced in: Vibe-Coded App Security Framework
# Chapter 2.5.1: HTTPS Everywhere
#
# Security Features:
# - HTTP to HTTPS redirect
# - TLS 1.2 and 1.3 only
# - Strong cipher suites
# - HSTS header
# - Security headers
# - OCSP stapling
# ============================================

# ============================================
# HTTP SERVER (Redirect to HTTPS)
# ============================================
server {
    listen 80;
    listen [::]:80;
    server_name yourapp.com www.yourapp.com;

    # Redirect all HTTP traffic to HTTPS
    return 301 https://$server_name$request_uri;
}

# ============================================
# HTTPS SERVER
# ============================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourapp.com www.yourapp.com;

    # ============================================
    # SSL CERTIFICATE
    # ============================================
    # Let's Encrypt certificates
    ssl_certificate /etc/letsencrypt/live/yourapp.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourapp.com/privkey.pem;

    # Trusted CA certificates for OCSP stapling
    ssl_trusted_certificate /etc/letsencrypt/live/yourapp.com/chain.pem;

    # ============================================
    # SSL/TLS CONFIGURATION
    # ============================================
    # Use TLS 1.2 and 1.3 only (disable older versions)
    ssl_protocols TLSv1.2 TLSv1.3;

    # Strong cipher suites (forward secrecy)
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    
    # Prefer server ciphers
    ssl_prefer_server_ciphers off;

    # ============================================
    # SSL SESSION
    # ============================================
    # SSL session cache (improves performance)
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # ============================================
    # OCSP STAPLING
    # ============================================
    # Improves SSL/TLS handshake performance
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # ============================================
    # SECURITY HEADERS
    # ============================================
    # HSTS (HTTP Strict Transport Security)
    # Force HTTPS for 1 year, including subdomains
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Prevent clickjacking
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Prevent MIME type sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # XSS protection (legacy, but doesn't hurt)
    add_header X-XSS-Protection "1; mode=block" always;

    # Referrer policy
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Content Security Policy (adjust for your app)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline';" always;

    # Permissions Policy (formerly Feature-Policy)
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ============================================
    # APPLICATION
    # ============================================
    root /var/www/yourapp/public;
    index index.html index.htm;

    # Proxy to Node.js application
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Static files (cache for 1 year)
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ============================================
    # LOGGING
    # ============================================
    access_log /var/log/nginx/yourapp-access.log;
    error_log /var/log/nginx/yourapp-error.log;
}

# ============================================
# REDIRECT www TO non-www (OPTIONAL)
# ============================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.yourapp.com;

    ssl_certificate /etc/letsencrypt/live/yourapp.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourapp.com/privkey.pem;

    return 301 https://yourapp.com$request_uri;
}

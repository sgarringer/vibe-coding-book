# security-headers.conf
# Include in your VirtualHost or .htaccess:
#
#   Include /etc/apache2/conf-available/security-headers.conf
#
# Required modules:
#   a2enmod headers

# ─── Strict-Transport-Security ────────────────────────────────────────────────
# Only add HSTS on HTTPS VirtualHost blocks.
# Remove 'preload' until you are ready to submit to the HSTS preload list.
Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"

# ─── X-Frame-Options ──────────────────────────────────────────────────────────
Header always set X-Frame-Options "DENY"

# ─── X-Content-Type-Options ───────────────────────────────────────────────────
Header always set X-Content-Type-Options "nosniff"

# ─── Referrer-Policy ──────────────────────────────────────────────────────────
Header always set Referrer-Policy "strict-origin-when-cross-origin"

# ─── Permissions-Policy ───────────────────────────────────────────────────────
Header always set Permissions-Policy "geolocation=(), microphone=(), camera=()"

# ─── Content-Security-Policy ──────────────────────────────────────────────────
# Baseline policy — tune for your application.
# See chapter-02/headers/csp/ for full CSP examples.
# Start with Report-Only (see Section 2.6.3.1), then switch to enforcing.
Header always set Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data: https:; connect-src 'self'; font-src 'self'; object-src 'none'; frame-src 'none'; base-uri 'self'; form-action 'self';"

# ─── Remove Headers That Leak Server Information ──────────────────────────────
Header always unset X-Powered-By
Header always unset Server
ServerTokens Prod
ServerSignature Off

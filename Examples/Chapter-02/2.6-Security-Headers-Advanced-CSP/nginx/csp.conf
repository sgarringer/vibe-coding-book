# csp.conf
# CSP-specific Nginx configuration.
# Include in your server {} block alongside security-headers.conf.
#
# Note: Nginx cannot generate per-request nonces natively.
# For nonce support, use the application-level examples (Node.js, Flask).
# This configuration is suitable for static sites or as a baseline
# before application-level CSP takes over.

# ─── Enforcing CSP ────────────────────────────────────────────────────────────
# Baseline policy — tune for your application.
# Comment this out and use the Report-Only header below during initial rollout.
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data: https:; connect-src 'self'; font-src 'self'; object-src 'none'; frame-src 'none'; base-uri 'self'; form-action 'self'; report-uri /csp-violations;" always;

# ─── Report-Only CSP (Week 1–2 of rollout — Section 2.6.3.1) ─────────────────
# Uncomment during initial rollout. Comment out the enforcing header above.
# add_header Content-Security-Policy-Report-Only "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data: https:; connect-src 'self'; font-src 'self'; object-src 'none'; frame-src 'none'; base-uri 'self'; form-action 'self'; report-uri /csp-violations;" always;

# ─── CSP Violation Reporting ──────────────────────────────────────────────────
# Proxy violation reports to your application's reporting endpoint.
# Remove this block if your application handles /csp-violations directly.
location /csp-violations {
    # Only accept POST requests from browsers
    limit_except POST { deny all; }

    # Proxy to your application server
    proxy_pass http://localhost:3000/csp-violations;
    proxy_set_header Content-Type $content_type;
}

# =============================================================================
# Week 1-2: Learning Mode Configuration
# Book Reference: Chapter 3, Section 3.2.1.3
# =============================================================================
#
# PURPOSE:
#   Deploy this configuration during weeks 1-2 of your security gate rollout.
#   Builds NEVER break. All findings are collected and reported so you can:
#     - Understand your current security baseline
#     - Identify false positives before enforcing rules
#     - Set realistic thresholds based on real data
#     - Train the team without blocking their work
#
# HOW TO USE:
#   1. Copy this file to .github/workflows/security-gate.yml
#   2. Run for 2 weeks, collecting data
#   3. Review the weekly summary reports
#   4. Use metrics-collector.py to analyze findings
#   5. Move to week-3-4-warning.yml when ready
#
# SUCCESS CRITERIA FOR MOVING TO WEEK 3-4:
#   - False positive rate understood and documented
#   - Team has reviewed at least one scan report
#   - Realistic thresholds identified from baseline data
#   - At least one critical finding has been fixed (shows process works)
# =============================================================================

name: Security Gate - Week 1-2 (Learning Mode)

on:
  push:
    branches: [ main, develop, staging, 'feature/**' ]
  pull_request:
    branches: [ main, develop ]
  # Weekly summary report
  schedule:
    - cron: '0 9 * * 1'    # Every Monday at 9am UTC

jobs:

  # ---------------------------------------------------------------------------
  # Learning mode scan - NEVER breaks the build
  # Collects data and posts informational PR comments
  # ---------------------------------------------------------------------------
  learning-mode-scan:
    name: "📚 Learning Mode - Security Scan (No Build Breaks)"
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write
      contents:      read

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # -----------------------------------------------------------------------
      # Announce learning mode prominently
      # Developers should know this is informational only
      # -----------------------------------------------------------------------
      - name: Announce learning mode
        run: |
          echo "============================================"
          echo "  LEARNING MODE - Week 1-2"
          echo "  Builds will NOT break in this phase."
          echo "  All findings are informational only."
          echo "  Goal: Understand your security baseline."
          echo "============================================"

      - name: Run Semgrep SAST
        run: |
          docker run --rm \
            -v "$PWD:/src" \
            returntocorp/semgrep \
            semgrep scan \
              --config=auto \
              --config=p/security-audit \
              --config=p/owasp-top-ten \
              --json \
              --output=/src/sast-results.json \
              /src || true

      - name: Run Trivy dependency scan
        run: |
          docker run --rm \
            -v "$PWD:/src" \
            aquasec/trivy:latest \
            fs \
              --format json \
              --output /src/trivy-results.json \
              --exit-code 0 \
              /src || true

      # -----------------------------------------------------------------------
      # Collect and store baseline metrics
      # This data drives threshold decisions in weeks 3-4
      # -----------------------------------------------------------------------
      - name: Collect baseline metrics
        id: metrics
        run: |
          DATE=$(date -u +"%Y-%m-%d")
          BRANCH="${{ github.ref_name }}"
          COMMIT="${{ github.sha }}"

          # SAST counts
          SAST_CRIT=$(jq '[.results[] |
            select(.extra.severity == "ERROR")]   | length' \
            sast-results.json 2>/dev/null || echo "0")
          SAST_HIGH=$(jq '[.results[] |
            select(.extra.severity == "WARNING")] | length' \
            sast-results.json 2>/dev/null || echo "0")
          SAST_MED=$(jq  '[.results[] |
            select(.extra.severity == "INFO")]    | length' \
            sast-results.json 2>/dev/null || echo "0")
          SAST_LOW=$(jq  '[.results[] |
            select(.extra.severity == "LOW")]     | length' \
            sast-results.json 2>/dev/null || echo "0")
          SAST_TOTAL=$(jq '.results | length' \
            sast-results.json 2>/dev/null || echo "0")

          # Unique rules triggered (helps identify false positive patterns)
          SAST_UNIQUE_RULES=$(jq '[.results[].check_id] | unique | length' \
            sast-results.json 2>/dev/null || echo "0")

          # Dependency counts
          DEP_CRIT=$(jq '[.Results[].Vulnerabilities[]? |
            select(.Severity == "CRITICAL")] | length' \
            trivy-results.json 2>/dev/null || echo "0")
          DEP_HIGH=$(jq '[.Results[].Vulnerabilities[]? |
            select(.Severity == "HIGH")]     | length' \
            trivy-results.json 2>/dev/null || echo "0")
          DEP_MED=$(jq  '[.Results[].Vulnerabilities[]? |
            select(.Severity == "MEDIUM")]   | length' \
            trivy-results.json 2>/dev/null || echo "0")

          # Write metrics to JSON for aggregation
          cat > daily-metrics.json << EOF
          {
            "date":             "$DATE",
            "branch":           "$BRANCH",
            "commit":           "$COMMIT",
            "phase":            "learning",
            "sast": {
              "critical":       $SAST_CRIT,
              "high":           $SAST_HIGH,
              "medium":         $SAST_MED,
              "low":            $SAST_LOW,
              "total":          $SAST_TOTAL,
              "unique_rules":   $SAST_UNIQUE_RULES
            },
            "dependencies": {
              "critical":       $DEP_CRIT,
              "high":           $DEP_HIGH,
              "medium":         $DEP_MED
            }
          }
          EOF

          # Export for summary
          echo "sast_critical=$SAST_CRIT"         >> $GITHUB_OUTPUT
          echo "sast_high=$SAST_HIGH"             >> $GITHUB_OUTPUT
          echo "sast_medium=$SAST_MED"            >> $GITHUB_OUTPUT
          echo "sast_unique_rules=$SAST_UNIQUE_RULES" >> $GITHUB_OUTPUT
          echo "dep_critical=$DEP_CRIT"           >> $GITHUB_OUTPUT
          echo "dep_high=$DEP_HIGH"               >> $GITHUB_OUTPUT

      # -----------------------------------------------------------------------
      # Write GitHub Actions step summary
      # -----------------------------------------------------------------------
      - name: Write learning mode summary
        run: |
          echo "## 📚 Security Scan - Learning Mode (Week 1-2)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> ℹ️ **Learning Mode**: This scan is informational only." >> $GITHUB_STEP_SUMMARY
          echo "> Builds will not break during weeks 1-2." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Findings (Baseline Data)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Scanner | Critical | High | Medium | Low | Unique Rules |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|----------|------|--------|-----|--------------|" >> $GITHUB_STEP_SUMMARY
          echo "| SAST | ${{ steps.metrics.outputs.sast_critical }} | ${{ steps.metrics.outputs.sast_high }} | ${{ steps.metrics.outputs.sast_medium }} | — | ${{ steps.metrics.outputs.sast_unique_rules }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dependencies | ${{ steps.metrics.outputs.dep_critical }} | ${{ steps.metrics.outputs.dep_high }} | — | — | — |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### What to do with this data" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "1. Review findings in the scan artifacts" >> $GITHUB_STEP_SUMMARY
          echo "2. Mark false positives with \`# nosemgrep\` comments" >> $GITHUB_STEP_SUMMARY
          echo "3. Track which rules fire most frequently" >> $GITHUB_STEP_SUMMARY
          echo "4. Use this data to set realistic thresholds for Week 3-4" >> $GITHUB_STEP_SUMMARY

      # -----------------------------------------------------------------------
      # Post informational PR comment
      # -----------------------------------------------------------------------
      - name: Post learning mode PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const sastCrit = '${{ steps.metrics.outputs.sast_critical }}';
            const sastHigh = '${{ steps.metrics.outputs.sast_high }}';
            const sastMed  = '${{ steps.metrics.outputs.sast_medium }}';
            const depCrit  = '${{ steps.metrics.outputs.dep_critical }}';
            const depHigh  = '${{ steps.metrics.outputs.dep_high }}';
            const runUrl   = '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}';

            const lines = [];
            lines.push('## Security Scan Results (Learning Mode - Week 1-2)');
            lines.push('');
            lines.push('> INFO: This scan is informational only.');
            lines.push('> Builds will not break during the learning phase.');
            lines.push('> Goal: Understand your security baseline before enforcing thresholds.');
            lines.push('');
            lines.push('### Findings');
            lines.push('');
            lines.push('| Scanner | Critical | High | Medium |');
            lines.push('|---------|----------|------|--------|');
            lines.push('| SAST (Semgrep) | ' + sastCrit + ' | ' + sastHigh + ' | ' + sastMed + ' |');
            lines.push('| Dependencies (Trivy) | ' + depCrit + ' | ' + depHigh + ' | - |');
            lines.push('');
            lines.push('### Your Action Items This Week');
            lines.push('');
            lines.push('- [ ] Review the scan artifacts and understand what was found');
            lines.push('- [ ] Identify any false positives (mark with nosemgrep: rule-id)');
            lines.push('- [ ] Note which findings are genuine issues vs noise');
            lines.push('- [ ] Share findings with the team in your next standup');
            lines.push('');
            lines.push('[View full scan results](' + runUrl + ')');
            lines.push('');
            lines.push('---');
            lines.push('Moving to Warning Mode (Week 3-4) when: false positive rate understood, team reviewed findings, realistic thresholds identified.');

            const body = lines.join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes('Learning Mode')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Upload metrics and scan artifacts
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: learning-mode-${{ github.run_number }}-${{ github.sha }}
          path: |
            sast-results.json
            trivy-results.json
            daily-metrics.json
          retention-days: 90

      # -----------------------------------------------------------------------
      # IMPORTANT: Never exit 1 in learning mode
      # This is the key difference from warning and enforcement modes
      # -----------------------------------------------------------------------
      - name: Learning mode - always pass
        run: |
          echo "✅ Learning mode scan complete."
          echo "   This build passed because we are in learning mode."
          echo "   Review findings above and plan your threshold configuration."
          echo ""
          echo "   Transition checklist:"
          echo "   □ False positive rate documented"
          echo "   □ Team has reviewed scan results"
          echo "   □ Realistic thresholds identified"
          echo "   □ At least one finding fixed"
          exit 0

# Fluent Bit Configuration
# Chapter 2.10.5
#
# Receives logs from Docker containers and ships to your log platform.
# Uncomment the OUTPUT section for your platform.
#
# Documentation: https://docs.fluentbit.io/manual

# ─── Service ──────────────────────────────────────────────────────────────────

[SERVICE]
    Flush         2           # flush every 2 seconds
    Daemon        Off
    Log_Level     warn        # fluent-bit's own log level
    Parsers_File  parsers.conf
    HTTP_Server   On          # health check endpoint
    HTTP_Listen   0.0.0.0
    HTTP_Port     2020

# ─── Input: Docker Log Driver ─────────────────────────────────────────────────
# Receives logs forwarded by Docker's fluentd log driver

[INPUT]
    Name          forward
    Listen        0.0.0.0
    Port          24224
    Buffer_Chunk_Size 1M
    Buffer_Max_Size   6M

# ─── Input: Application Log Files ─────────────────────────────────────────────
# Tail log files written by the application (alternative to Docker driver)

[INPUT]
    Name          tail
    Path          /var/log/app/*.log
    Parser        json
    Tag           app.file
    Refresh_Interval 5
    Mem_Buf_Limit 5MB
    Skip_Long_Lines On

# ─── Filter: Parse JSON Logs ──────────────────────────────────────────────────
# Parse the log field as JSON so structured fields are queryable

[FILTER]
    Name          parser
    Match         app.*
    Key_Name      log
    Parser        json
    Reserve_Data  On
    Preserve_Key  Off

# ─── Filter: Add Metadata ─────────────────────────────────────────────────────
# Add environment metadata to every log entry

[FILTER]
    Name          record_modifier
    Match         app.*
    Record        environment ${ENV}
    Record        app_name    ${APP_NAME}
    Record        shipper     fluent-bit

# ─── Output: AWS CloudWatch ───────────────────────────────────────────────────
# Uncomment to ship to CloudWatch (matches log groups created by setup.sh)

[OUTPUT]
    Name              cloudwatch_logs
    Match             app.*
    region            ${AWS_REGION}
    log_group_name    /app/${APP_NAME}/${ENV}/application
    log_stream_prefix fluent-bit/
    auto_create_group false
    retry_limit       5

# ─── Output: Google Cloud Logging ─────────────────────────────────────────────
# Uncomment to ship to GCP instead of CloudWatch


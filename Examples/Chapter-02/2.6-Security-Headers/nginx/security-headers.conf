# security-headers.conf
# Include this file in your server {} block:
#
#   server {
#       include /etc/nginx/conf.d/security-headers.conf;
#       ...
#   }

# ─── Strict-Transport-Security ────────────────────────────────────────────────
# Only add HSTS on HTTPS server blocks.
# Remove 'preload' until you are ready to submit to the HSTS preload list.
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

# ─── X-Frame-Options ──────────────────────────────────────────────────────────
add_header X-Frame-Options "DENY" always;

# ─── X-Content-Type-Options ───────────────────────────────────────────────────
add_header X-Content-Type-Options "nosniff" always;

# ─── Referrer-Policy ──────────────────────────────────────────────────────────
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# ─── Permissions-Policy ───────────────────────────────────────────────────────
add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

# ─── Content-Security-Policy ──────────────────────────────────────────────────
# Baseline policy — tune for your application.
# See chapter-02/headers/csp/ for full CSP examples.
# Start with Report-Only (see Section 2.6.3.1), then switch to enforcing.
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data: https:; connect-src 'self'; font-src 'self'; object-src 'none'; frame-src 'none'; base-uri 'self'; form-action 'self';" always;

# ─── Remove Headers That Leak Server Information ──────────────────────────────
# Requires nginx to be compiled with --with-http_headers_more_module
# more_clear_headers Server;
# more_clear_headers X-Powered-By;
